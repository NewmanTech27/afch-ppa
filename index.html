<style>
 :root{--bg:#F6F4F9;--ink:#221A33;--muted:#5F5870;--accent:#621558;--line:#E4DEF1;--navy:#191B4D;--logo:linear-gradient(105deg,#191B4D,#3A1852,#981060,#B80E65)}
 *{box-sizing:border-box;margin:0;padding:0}
 body{font-family:Inter,-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px}
 .card{width:100%;max-width:380px;text-align:center}
 .iso{width:72px;height:72px;border-radius:4px;background:var(--logo);margin:0 auto 26px}
 h1{font-family:'Space Grotesk',Arial,sans-serif;font-weight:300;font-size:26px;letter-spacing:.01em}
 p{color:var(--muted);font-size:14px;margin-top:10px}
 form{margin-top:28px;display:flex;flex-direction:column;gap:12px}
 input{font-family:inherit;font-size:16px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);text-align:center;letter-spacing:.04em}
 input:focus{outline:none;border-color:var(--accent)}
 button{font-family:'Space Grotesk',Arial,sans-serif;font-size:15px;letter-spacing:.03em;padding:14px;border:0;border-radius:100px;background:var(--accent);color:#fff;cursor:pointer}
 button:hover{background:#4C1043}
 .err{color:#8A0A4B;font-size:13px;min-height:18px;margin-top:4px}
 .foot{margin-top:26px;font-family:'Space Grotesk',Arial,sans-serif;font-size:12px;letter-spacing:.1em;color:var(--muted)}
 .foot a{color:var(--muted);text-decoration:none}
</style>

const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('err');err.textContent='';
  const pw=document.getElementById('pw').value;
  try{
    const bk=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(P.s),iterations:250000,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(P.i)},k,b(P.c));
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(_){err.textContent='Clave incorrecta.';}
});
</script>
